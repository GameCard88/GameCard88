<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บ้านเกมการ์ด ทันใจ</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#0e1117;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e2e8f0}
    .wrap{text-align:center;padding:40px 24px}
    .spinner{width:36px;height:36px;border:3px solid #1e2538;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{font-size:13px;color:#4a5568}
  </style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>กำลังโหลด...</p>
</div>
<script>
// ดึง order ID จาก ?o=XXXX แล้ว redirect ไป GAS ทันที
const GAS = 'https://script.google.com/macros/s/AKfycbxJA3MGl1s_gDoNcwe-BcxlqvdGEaA_NoMLDlEDdTQiw4fmKF6VdrlhljJeRgWW9mWzsw/exec';
const o   = new URLSearchParams(window.location.search).get('o') || '';
if (o) {
  window.location.replace(GAS + '?page=card&order=' + encodeURIComponent(o));
} else {
  document.querySelector('p').textContent = 'ลิงก์ไม่ถูกต้อง กรุณาติดต่อร้านค้า';
  document.querySelector('.spinner').style.display = 'none';
}
</script>
</body>
</html>
